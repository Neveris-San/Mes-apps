<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Mes Applications</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f2;
    --card: #ffffff;
    --text: #1a1a1a;
    --text2: #777;
    --border: rgba(0,0,0,0.08);
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
    --shadow-hover: 0 8px 28px rgba(0,0,0,0.13);
    --radius: 20px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141414;
      --card: #1f1f1f;
      --text: #f0f0f0;
      --text2: #888;
      --border: rgba(255,255,255,0.08);
      --shadow: 0 2px 12px rgba(0,0,0,0.4);
      --shadow-hover: 0 8px 28px rgba(0,0,0,0.5);
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 20px;
  }

  .header {
    text-align: center;
    margin-bottom: 40px;
  }

  .header-eyebrow {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 12px;
  }

  .header-title {
    font-size: 32px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.5px;
    line-height: 1.1;
  }

  .apps {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 100%;
    max-width: 420px;
  }

  .app-card {
    background: var(--card);
    border-radius: var(--radius);
    border: 0.5px solid var(--border);
    padding: 24px;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 20px;
    box-shadow: var(--shadow);
    transition: transform 0.15s, box-shadow 0.15s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .app-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: var(--radius) var(--radius) 0 0;
  }

  .app-card.vg::before  { background: linear-gradient(90deg, #3b6d11, #639922); }
  .app-card.ma::before  { background: linear-gradient(90deg, #185fa5, #2e82d4); }

  .app-card:hover  { transform: translateY(-3px); box-shadow: var(--shadow-hover); }
  .app-card:active { transform: scale(0.98); }

  .app-icon {
    width: 64px;
    height: 64px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    flex-shrink: 0;
  }

  .app-icon.vg { background: #eaf3de; }
  .app-icon.ma { background: #e6f1fb; }

  .app-info { flex: 1; min-width: 0; }

  .app-name {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }

  .app-desc {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.4;
  }

  .app-arrow {
    font-size: 20px;
    color: var(--text2);
    flex-shrink: 0;
    opacity: 0.5;
  }

  .footer {
    margin-top: 40px;
    font-size: 12px;
    color: var(--text2);
    text-align: center;
    opacity: 0.6;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-eyebrow">Mes applications</div>
  <div class="header-title">Que veux-tu<br>faire aujourd'hui ?</div>
</div>

<div class="apps">
  <a class="app-card vg" href="vide-grenier.html">
    <div class="app-icon vg">🛍</div>
    <div class="app-info">
      <div class="app-name">Vide-Grenier</div>
      <div class="app-desc">Stock, calendrier, ventes et achats — profils SEV et WILL</div>
    </div>
    <div class="app-arrow">›</div>
  </a>

  <a class="app-card ma" href="ma-tournee.html">
    <div class="app-icon ma">📬</div>
    <div class="app-info">
      <div class="app-name">Ma Tournée</div>
      <div class="app-desc">Gestion des tournées de distribution — La Poste Tarascon</div>
    </div>
    <div class="app-arrow">›</div>
  </a>
</div>

<div class="footer">Swipe pour naviguer · Données sauvegardées dans le cloud</div>

</body>
</html>
